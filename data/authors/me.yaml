bio: >
  Edward Sharkey is a Partner at Baringa, where he leads the firm's SAIL
  (AI advisory) unit. He holds a PhD in Computer Science from UCL and is a
  Visiting Research Fellow there, with research spanning Transformer models,
  commodity forecasting, and applied AI for energy infrastructure. His work
  sits at the intersection of machine learning and UK energy systems, including
  transmission networks, distribution operators, and regulators. He has led AI
  programmes with the Energy Networks Association, including the UK's first
  centralised platform for low-carbon technology connections, and Project FRAME
  with National Grid, a risk-informed asset management system for transmission
  infrastructure.
